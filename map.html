<style>
:root{--ocean:#0a3d62;--kelp-light:#52b788;--danger:#c0392b;--warning:#f0a500;--text:#1a1a2e;--text-muted:#5a6473;--bg:#f0f4f8;--white:#ffffff;--border:#dce3ea;--radius:16px;--radius-sm:10px;--nav-h:64px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#map{flex:1;min-height:0;height:calc(100vh - 120px)}
.header{background:var(--ocean);padding:48px 20px 12px;position:relative;overflow:hidden;flex-shrink:0}
.header-wave{position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(-45deg,transparent,transparent 20px,#fff 20px,#fff 22px)}
.header-content{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between}
.header-title{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;color:#fff}
.header-title span{color:var(--kelp-light)}
.btn-back{color:#fff;font-size:13px;cursor:pointer;background:rgba(255,255,255,.15);padding:6px 12px;border-radius:100px;border:none;font-family:inherit}
.map-tabs{background:var(--ocean);padding:0 16px 12px;display:flex;gap:8px;flex-shrink:0}
.map-tab{flex:1;padding:7px 10px;border-radius:100px;border:1.5px solid rgba(255,255,255,.25);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;text-align:center}
.map-tab.active{background:#fff;border-color:#fff;color:var(--ocean)}
.gps-status{padding:8px 16px;display:flex;align-items:flex-start;gap:10px;font-size:12px;flex-shrink:0;transition:background .3s}
.gps-status.searching{background:#e8eef8;color:var(--ocean)}
.gps-status.safe{background:#e8f5ee;color:#1a6b3a}
.gps-status.warning{background:#fde8e8;color:var(--danger)}
.gps-status.caution{background:#fdf0e0;color:#7a4f00}
.gps-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.searching .gps-dot{background:var(--ocean)}
.safe .gps-dot{background:#27ae60}
.warning .gps-dot{background:var(--danger)}
.caution .gps-dot{background:var(--warning)}
#map-wrap{flex:1;min-height:0;position:relative;display:flex;flex-direction:column}
.map-legend{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);border-radius:10px;padding:8px 12px;font-size:11px;z-index:400;display:flex;flex-wrap:wrap;gap:8px;max-width:300px;box-shadow:0 2px 8px rgba(0,0,0,.15);pointer-events:none}
.legend-item{display:flex;align-items:center;gap:5px;color:var(--text-muted)}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.legend-you{background:#2980b9;border:2px solid #fff;box-shadow:0 0 0 2px #2980b9}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:501;transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:75vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.drawer.open{transform:translateX(-50%) translateY(0)}
.drawer-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.drawer-body{padding:16px 20px 32px}
.d-type-pill{display:inline-block;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700;margin-bottom:10px}
.pill-smr{background:#fde8e8;color:var(--danger)}
.pill-smca{background:#fdf0e0;color:#7a4f00}
.pill-park{background:#e8eef8;color:var(--ocean)}
.pill-spot{background:#e8f5ee;color:#1a6b3a}
.d-name{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:900;color:var(--text);margin-bottom:8px;line-height:1.3}
.d-section{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;font-family:'Unbounded',sans-serif;margin:12px 0 6px}
.d-note{background:var(--bg);border-radius:var(--radius-sm);padding:12px;font-size:13px;line-height:1.6;color:var(--text)}
.d-note.danger{background:#fde8e8;color:#7a0000;border-left:3px solid var(--danger);border-radius:0}
.d-note.warning{background:#fdf0e0;color:#7a4f00;border-left:3px solid var(--warning);border-radius:0}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav-h);background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;text-decoration:none;color:var(--text-muted);font-size:10px;font-family:'DM Sans',sans-serif;transition:color .2s}
.nav-item.active{color:var(--ocean)}
.nav-icon{font-size:22px;line-height:1}
</style>
</head>

</div>

  { name: 'Lake Tahoe', lat: 39.097, lng: -120.032, type: 'lake', species: ['Lake Trout', 'Rainbow Trout', 'Brown Trout', 'Kokanee Salmon'], tips: 'Deep, ultra-clear alpine lake. Excellent mackinaw (lake trout) trolling in deep water. Beautiful setting.' },
  { name: 'Sacramento River', lat: 40.178, lng: -122.241, type: 'river', species: ['Salmon (Chinook/King)', 'Steelhead', 'White Sturgeon', 'Striped Bass'], tips: 'Prime salmon and steelhead water in fall and winter. Sturgeon below the diversion dam. Check current run status.' },

  { name: 'Pyramid Lake', lat: 34.774, lng: -118.782, type: 'lake', species: ['Rainbow Trout', 'Largemouth Bass', 'Striped Bass', 'Catfish (Channel)'], tips: 'Popular SoCal reservoir with good variety. Stocked trout in spring. Bass fishing in coves year-round.' },
  { name: 'Lake Casitas', lat: 34.372, lng: -119.327, type: 'lake', species: ['Largemouth Bass', 'Rainbow Trout', 'Catfish (Channel)', 'Crappie (Black)'], tips: 'Prime SoCal bass water — produced several world record bass. No swimming allowed. Trophy trout in winter.' },
  { name: 'Colorado River', lat: 35.157, lng: -114.572, type: 'river', species: ['Striped Bass', 'Largemouth Bass', 'Catfish (Channel)', 'Rainbow Trout'], tips: 'Warm-water fishery along CA-NV border. Excellent stripers and catfish. Trout in tailwater below Davis Dam.' },
];

// ── Map state ─────────────────────────────────────────────────
var map, userMarker, mpaLayers = [], spotMarkers = [];
var currentTab = 'map';
var userLat = null, userLng = null;
var MPAS = [];
var mpaGeoJSON = null;

function getMPAType(props) {
  const type = (props.Type || props.TYPE || props.type || '').trim().toUpperCase();
  if (type === 'SMR') return 'SMR';
  if (type === 'SMCA' || type === 'SMCA (NO-TAKE)') return 'SMCA';
  if (type === 'SMP') return 'SMP';
  if (type === 'SMRMA') return 'SMRMA';
  if (type === 'SPECIAL CLOSURE' || type === 'SC') return 'SC';
  const name = (props.FULLNAME || props.NAME || '').toLowerCase();
  if (name.includes('state marine reserve')) return 'SMR';
  if (name.includes('conservation area')) return 'SMCA';
  if (name.includes('marine park')) return 'SMP';
  return 'SMCA';
}

function getMPAColor(type) {
  if (type === 'SMR') return '#cc0000';
  if (type === 'SMCA') return '#ff8800';
  if (type === 'SMP') return '#0066cc';
  if (type === 'SC') return '#888888';
  return '#888800';
}

function getMPAFillOpacity(type) {
  if (type === 'SMR') return 0.35;
  if (type === 'SMCA') return 0.2;
  return 0.15;
}

function getRestrictions(type) {
  if (type === 'SMR') return 'State Marine Reserve — No take of any living or non-living marine resource. No fishing of any kind is permitted within this area.';
  if (type === 'SMCA') return 'State Marine Conservation Area — Take of most species is prohibited. Some recreational fishing may be allowed. Always verify specific rules at wildlife.ca.gov before fishing.';
  if (type === 'SMP') return 'State Marine Park — Recreational take of certain invertebrates and plants may be allowed. Verify current rules at wildlife.ca.gov.';
  return 'Marine Protected Area — Fishing restrictions apply. Verify current rules at wildlife.ca.gov before fishing.';
}

async function loadMPAs() {
  setGPSStatus('searching', 'Loading official CDFW MPA boundaries…');
  try {
    const res = await fetch(
      'https://services2.arcgis.com/Uq9r85Potqm3MfRV/arcgis/rest/services/biosds582_fpu/FeatureServer/0/query' +
      '?where=1%3D1&outFields=*&outSR=4326&f=geojson&resultRecordCount=200'
    );
    if (!res.ok) throw new Error('CDFW API error');
    const data = await res.json();
    if (data.features && data.features.length > 0) {
      mpaGeoJSON = data;
      drawMPAPolygons(data);
      MPAS = data.features.map(f => {
        const props = f.properties;
        const type = getMPAType(props);
        const bbox = getBBox(f.geometry);
        return {
          name: props.NAME || props.SHORTNAME || 'MPA',
          type, lat: (bbox.minLat + bbox.maxLat) / 2,
          lng: (bbox.minLng + bbox.maxLng) / 2,
          radius: estimateRadius(bbox),
          restrictions: getRestrictions(type),
          ccr: 'CCR Title 14, Section 632',
          geometry: f.geometry
        };
      }).filter(m => m.lat && m.lng && !isNaN(m.lat));
      console.log('Loaded ' + MPAS.length + ' official CDFW MPAs');
      setGPSStatus('searching', 'Getting your location…');
      locateUser();
      return;
    }
  } catch(e) {
    console.warn('CDFW polygon API failed, trying coordinate points…', e);
  }

  try {
    const res = await fetch(
      'https://services2.arcgis.com/Uq9r85Potqm3MfRV/arcgis/rest/services/biosds3207_fmu/FeatureServer/0/query' +
      '?where=1%3D1&outFields=MPA_Name,Type,Regulation&outSR=4326&f=geojson&resultRecordCount=500'
    );
    const data = await res.json();
    if (data.features && data.features.length > 0) {
      const mpaMap = {};
      data.features.forEach(f => {
        const name = f.properties.MPA_Name;
        const type = (f.properties.Type || '').includes('Reserve') ? 'SMR' : 'SMCA';
        const coords = f.geometry && f.geometry.coordinates;
        if (!name || !coords) return;
        if (!mpaMap[name]) mpaMap[name] = { name, type, lats: [], lngs: [], ccr: f.properties.Regulation || 'CCR Title 14, Section 632' };
        mpaMap[name].lats.push(coords[1]);
        mpaMap[name].lngs.push(coords[0]);
      });
      MPAS = Object.values(mpaMap).map(m => {
        const lat = m.lats.reduce((a,b)=>a+b,0)/m.lats.length;
        const lng = m.lngs.reduce((a,b)=>a+b,0)/m.lngs.length;
        const latSpread = Math.max(...m.lats) - Math.min(...m.lats);
        const lngSpread = Math.max(...m.lngs) - Math.min(...m.lngs);
        const radius = Math.max(1000, Math.min(15000, Math.max(latSpread, lngSpread) * 111000 * 0.6));
        return { name: m.name, type: m.type, lat, lng, radius, restrictions: getRestrictions(m.type), ccr: m.ccr };
      });
      MPAS.forEach(mpa => {
        const color = mpa.type === 'SMR' ? '#cc0000' : '#ff8800';
        const circle = L.circle([mpa.lat, mpa.lng], { radius: mpa.radius, color, fillColor: color, fillOpacity: mpa.type === 'SMR' ? 0.25 : 0.18, weight: 2 }).addTo(map);
        circle.on('click', () => showMPADetail(mpa));
        mpaLayers.push({ circle, mpa });
      });
      console.log('Loaded ' + MPAS.length + ' MPAs from coordinate points API');
      setGPSStatus('searching', 'Getting your location…');
      locateUser();
      return;
    }
  } catch(e) {
    console.warn('Both CDFW APIs failed, using fallback data', e);
  }

  // Final fallback
  MPAS = MPAS_FALLBACK;
  MPAS.forEach(mpa => {
    const color = mpa.type === 'SMR' ? '#cc0000' : '#ff8800';
    const circle = L.circle([mpa.lat, mpa.lng], { radius: mpa.radius, color, fillColor: color, fillOpacity: mpa.type === 'SMR' ? 0.25 : 0.18, weight: 2 }).addTo(map);
    circle.on('click', () => showMPADetail(mpa));
    mpaLayers.push({ circle, mpa });
  });
  setGPSStatus('searching', 'Getting your location…');
  locateUser();
}

function drawMPAPolygons(geojson) {
  const geoLayer = L.geoJSON(geojson, {
    style: feature => {
      const type = getMPAType(feature.properties);
      return { color: getMPAColor(type), fillColor: getMPAColor(type), fillOpacity: getMPAFillOpacity(type), weight: 2 };
    },
    onEachFeature: (feature, layer) => {
      const props = feature.properties;
      const type = getMPAType(props);
      const mpa = {
        name: props.FULLNAME || props.NAME || props.SHORTNAME || 'Marine Protected Area',
        type, restrictions: getRestrictions(type), ccr: 'CCR Title 14, Section 632'
      };
      layer.on('click', (e) => { L.DomEvent.stopPropagation(e); showMPADetail(mpa); });
      mpaLayers.push({ layer, mpa, isPolygon: true });
    }
  }).addTo(map);
}

function checkPointInPolygon(lat, lng) {
  if (!mpaGeoJSON) return null;
  for (const feature of mpaGeoJSON.features) {
    try {
      if (isPointInGeoJSON(lat, lng, feature.geometry)) {
        const props = feature.properties;
        const type = getMPAType(props);
        return { name: props.NAME || props.FULLNAME || props.SHORTNAME || 'MPA', type, restrictions: getRestrictions(type), ccr: 'CCR Title 14, Section 632' };
      }
    } catch(e) {}
  }
  return null;
}

function isPointInGeoJSON(lat, lng, geometry) {
  if (!geometry) return false;
  const coords = geometry.type === 'Polygon' ? [geometry.coordinates] :
                 geometry.type === 'MultiPolygon' ? geometry.coordinates : [];
  for (const poly of coords) {
    for (const ring of poly) {
      if (pointInRing(lng, lat, ring)) return true;
    }
  }
  return false;
}

function pointInRing(x, y, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

function getBBox(geometry) {
  const coords = [];
  function extract(c) { if (typeof c[0] === 'number') coords.push(c); else c.forEach(extract); }
  extract(geometry.coordinates);
  const lngs = coords.map(c => c[0]);
  const lats = coords.map(c => c[1]);
  return { minLat: Math.min(...lats), maxLat: Math.max(...lats), minLng: Math.min(...lngs), maxLng: Math.max(...lngs) };
}

function estimateRadius(bbox) {
  const latSpan = (bbox.maxLat - bbox.minLat) * 111000;
  const lngSpan = (bbox.maxLng - bbox.minLng) * 111000 * Math.cos(bbox.minLat * Math.PI / 180);
  return Math.max(500, Math.min(20000, Math.max(latSpan, lngSpan) * 0.6));
}

// FIX: setGPSStatus now accepts 3rd arg 'detail' and displays it
function setGPSStatus(cls, msg, detail) {
  var el = document.getElementById('gpsStatus');
  el.className = 'gps-status ' + cls;
  var detailHtml = detail ? '<div style="font-size:11px;opacity:.8;margin-top:2px">' + detail + '</div>' : '';
  el.innerHTML = '<div class="gps-dot"></div><div>' + msg + detailHtml + '</div>';
}

function locateUser() {
  if (!navigator.geolocation) { setGPSStatus('safe', 'Tap map to explore MPA boundaries'); return; }
  navigator.geolocation.getCurrentPosition(function(pos) {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    var icon = L.divIcon({
      html: '<div style="background:#2980b9;border:3px solid #fff;border-radius:50%;width:18px;height:18px;box-shadow:0 0 0 3px rgba(41,128,185,.4)"></div>',
      className: '', iconSize: [18, 18], iconAnchor: [9, 9]
    });
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.marker([userLat, userLng], { icon: icon, zIndexOffset: 1000 }).addTo(map);
    map.setView([userLat, userLng], 11);
    checkMPAProximity(userLat, userLng);
  }, function() {
    setGPSStatus('safe', 'Location access denied — tap map to explore');
  });
}

function checkMPAProximity(lat, lng) {
  var userPt = L.latLng(lat, lng);
  if (mpaGeoJSON) {
    var inside = checkPointInPolygon(lat, lng);
    if (inside) {
      var t = inside.type === 'SMR' ? 'State Marine Reserve' : 'Conservation Area';
      // FIX: pass detail as 3rd arg — now correctly displayed
      setGPSStatus('warning', '⚠️ INSIDE ' + t + '!', inside.name + ' — ' + (inside.type === 'SMR' ? 'NO FISHING' : 'Fishing restricted'));
      return;
    }
    setGPSStatus('safe', '✅ No MPAs detected at your location');
    return;
  }
  var inside2 = null, nearest = null, nearestDist = Infinity;
  MPAS_FALLBACK.forEach(function(mpa) {
    var dist = userPt.distanceTo(L.latLng(mpa.lat, mpa.lng));
    if (dist <= mpa.radius) { inside2 = mpa; }
    else if (dist <= mpa.radius * 1.2 && dist < nearestDist) { nearestDist = dist; nearest = mpa; }
  });
  if (inside2) {
    setGPSStatus('warning', '⚠️ You may be inside ' + inside2.name, inside2.type === 'SMR' ? 'NO FISHING — verify at wildlife.ca.gov' : 'Fishing restricted — verify specific rules');
  } else if (nearest) {
    setGPSStatus('caution', '⚠️ Near ' + nearest.name, 'Check exact boundaries before fishing');
  } else {
    setGPSStatus('safe', '✅ No MPAs detected near your location');
  }
}

// FIX: isSpotInMPA — check spot against real polygon data (primary) or fallback circles
function isSpotInMPA(spot) {
  if (mpaGeoJSON) {
    return checkPointInPolygon(spot.lat, spot.lng);
  }
  for (var i = 0; i < MPAS_FALLBACK.length; i++) {
    var mpa = MPAS_FALLBACK[i];
    var dist = L.latLng(spot.lat, spot.lng).distanceTo(L.latLng(mpa.lat, mpa.lng));
    if (dist <= mpa.radius) return mpa;
  }
  return null;
}

// FIX: drawSpots — skips SMR spots, shows orange marker for SMCA spots
function drawSpots() {
  spotMarkers.forEach(function(m) { map.removeLayer(m); });
  spotMarkers = [];
  FISHING_SPOTS.forEach(function(spot) {
    var inMPA = isSpotInMPA(spot);
    // Never show a fishing spot marker inside a no-take SMR
    if (inMPA && inMPA.type === 'SMR') {
      console.warn('[FS] Spot suppressed — inside SMR:', spot.name, inMPA.name);
      return;
    }
    // Orange marker if near/inside SMCA, green if clear
    var bgColor = inMPA ? '#f0a500' : '#27ae60';
    var icon = L.divIcon({
      html: '<div style="background:' + bgColor + ';color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)">🎣</div>',
      className: '', iconSize: [28, 28], iconAnchor: [14, 14]
    });
    var marker = L.marker([spot.lat, spot.lng], { icon: icon }).addTo(map);
    marker.on('click', function() { showSpotDetail(spot, inMPA); });
    spotMarkers.push(marker);
  });
}

// FIX: switchTab — uses correct layer reference (item.layer or item.circle)
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-map').classList.toggle('active', tab === 'map');
  document.getElementById('tab-spots').classList.toggle('active', tab === 'spots');
  if (tab === 'spots') {
    drawSpots();
    mpaLayers.forEach(function(item) {
      var l = item.isPolygon ? item.layer : item.circle;
      if (l && l.setStyle) l.setStyle({ opacity: 0.3, fillOpacity: 0.05 });
    });
  } else {
    spotMarkers.forEach(function(m) { map.removeLayer(m); });
    spotMarkers = [];
    mpaLayers.forEach(function(item) {
      var l = item.isPolygon ? item.layer : item.circle;
      var mpa = item.mpa;
      if (!l || !l.setStyle) return;
      var color = mpa ? getMPAColor(mpa.type) : '#0066cc';
      var fi = mpa ? getMPAFillOpacity(mpa.type) : 0.15;
      l.setStyle({ color: color, fillColor: color, fillOpacity: fi, opacity: 1 });
    });
  }
}

function showMPADetail(mpa) {
  var typeClass = mpa.type === 'SMR' ? 'pill-smr' : mpa.type === 'SMCA' ? 'pill-smca' : 'pill-park';
  var noteClass = mpa.type === 'SMR' ? 'danger' : 'warning';
  var html = '<div class="d-type-pill ' + typeClass + '">' + mpa.type + ' · Marine Protected Area</div>'
    + '<div class="d-name">' + mpa.name + '</div>'
    + '<div class="d-section">Restrictions</div>'
    + '<div class="d-note ' + noteClass + '">' + mpa.restrictions + '</div>'
    + '<div class="d-section">Legal Reference</div>'
    + '<div class="d-note">' + mpa.ccr + '</div>'
    + '<div class="d-note" style="margin-top:8px;font-size:12px">Always verify current boundaries and rules at <a href="https://wildlife.ca.gov/Conservation/Marine/MPAs" style="color:var(--ocean)">wildlife.ca.gov</a></div>';
  document.getElementById('drawerBody').innerHTML = html;
  openDrawer();
}

// FIX: showSpotDetail — shows MPA proximity warning when applicable
function showSpotDetail(spot, inMPA) {
  var html = '<div class="d-type-pill pill-spot">🎣 ' + (spot.type || 'Fishing Spot') + '</div>'
    + '<div class="d-name">' + spot.name + '</div>';
  if (inMPA) {
    html += '<div class="d-note warning" style="margin-bottom:8px">⚠️ This spot is near or within <strong>' + inMPA.name + '</strong> (' + inMPA.type + '). '
      + (inMPA.type === 'SMR' ? 'This is a no-take zone — no fishing of any kind.' : 'Some fishing restrictions apply.')
      + ' Always verify at <a href="https://wildlife.ca.gov" style="color:#7a4f00">wildlife.ca.gov</a> before fishing.</div>';
  }
  if (spot.species && spot.species.length) {
    html += '<div class="d-section">Common Species</div>'
      + '<div class="d-note">' + spot.species.join(', ') + '</div>';
  }
  if (spot.tips) {
    html += '<div class="d-section">Insider Tips</div>'
      + '<div class="d-note">' + spot.tips + '</div>';
  }
  html += '<div class="d-note" style="margin-top:8px;font-size:12px">Always verify current regulations at <a href="https://wildlife.ca.gov" style="color:var(--ocean)">wildlife.ca.gov</a> before keeping any catch.</div>';
  document.getElementById('drawerBody').innerHTML = html;
  openDrawer();
}

function initMap() {
  try {
    map = L.map('map', { center: [36.7, -121.9], zoom: 7, zoomControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 18 }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);
    map.on('click', function(e) { closeDrawer(); });
    map.invalidateSize();
    loadMPAs();
  } catch(e) {
    console.error('initMap error:', e);
    document.getElementById('map').innerHTML = '<div style="padding:20px;text-align:center">Map failed to load.</div>';
  }
}

function openDrawer() {
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

var touchStartY = 0;
document.getElementById('drawer').addEventListener('touchstart', function(e) { touchStartY = e.touches[0].clientY; }, { passive: true });
document.getElementById('drawer').addEventListener('touchend', function(e) { if (e.changedTouches[0].clientY - touchStartY > 80) closeDrawer(); }, { passive: true });

initMap();
</script>
