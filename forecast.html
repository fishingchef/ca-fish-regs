<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fish Smarter — Tides & Forecast</title>
<meta name="theme-color" content="#0a3d62">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--ocean:#0a3d62;--ocean-mid:#1a5f8a;--ocean-light:#2980b9;--kelp-light:#52b788;--text:#1a1a2e;--text-muted:#5a6473;--bg:#f0f4f8;--white:#ffffff;--border:#dce3ea;--radius:16px;--radius-sm:10px;--nav-h:64px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:var(--nav-h)}

/* ── Header ── */
.header{background:var(--ocean);padding:48px 20px 20px;position:relative;overflow:hidden}
.header-wave{position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(-45deg,transparent,transparent 20px,#fff 20px,#fff 22px)}
.header-content{position:relative;z-index:1}
.app-eyebrow{font-family:'Unbounded',sans-serif;font-size:10px;color:rgba(255,255,255,.5);letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
.page-title{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;color:#fff;margin-bottom:14px}
.page-title span{color:var(--kelp-light)}
.search-row{display:flex;gap:8px}
.loc-input-wrap{flex:1;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;gap:8px;padding:0 12px}
.loc-input-wrap input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 0}
.loc-input-wrap input::placeholder{color:rgba(255,255,255,.6)}
.btn-search{background:var(--kelp-light);color:#fff;border:none;border-radius:10px;padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}

/* ── Spots strip ── */
.spots-strip{padding:10px 0 6px}
.spots-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px}
.spots-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;cursor:grab;-webkit-overflow-scrolling:touch}
.spots-row::-webkit-scrollbar{display:none}
.spot-btn{flex-shrink:0;display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);border:none;border-radius:100px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;white-space:nowrap}
.spot-btn:active{background:rgba(255,255,255,.3)}
.spot-btn.gps-btn{background:rgba(255,255,255,.25);font-weight:600}
.spot-btn.fav-active{background:rgba(82,183,136,.35);border:1px solid rgba(82,183,136,.6)}
.spot-star{font-size:12px;cursor:pointer;opacity:.7;transition:opacity .15s}
.spot-star:hover{opacity:1}

/* ── Favorites section ── */
.favs-section{padding:12px 20px 0}
.favs-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px}
.favs-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.favs-row::-webkit-scrollbar{display:none}
.fav-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;background:rgba(82,183,136,.2);border:1px solid rgba(82,183,136,.4);color:#fff;border-radius:100px;padding:5px 12px 5px 10px;font-size:11px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
.fav-chip:hover{background:rgba(82,183,136,.35)}
.fav-chip-remove{font-size:14px;opacity:.6;margin-left:2px;line-height:1}
.fav-chip-remove:hover{opacity:1}
.favs-empty{font-size:11px;color:rgba(255,255,255,.35);padding:4px 0 8px;font-style:italic}

/* ── Content ── */
.content{padding:16px}
.section-label{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin:0 0 10px}

/* ── Score card ── */
.score-card{border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.score-num{font-family:'Unbounded',sans-serif;font-size:52px;font-weight:900;color:#fff;line-height:1}
.score-info-title{font-size:14px;font-weight:700;color:#fff}
.score-info-sub{font-size:12px;color:rgba(255,255,255,.85);margin-top:3px}

/* ── 7-day GRID (replaces horizontal scroll tabs) ── */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.week-cell{background:var(--white);border-radius:10px;padding:8px 4px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s;min-width:0}
.week-cell.active{border-color:var(--ocean);background:var(--ocean)}
.week-cell.active .wc-label{color:rgba(255,255,255,.7)}
.week-cell.active .wc-score{color:var(--kelp-light)}
.week-cell.active .wc-icon{filter:none}
.wc-label{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wc-icon{font-size:18px;line-height:1;margin-bottom:3px}
.wc-score{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700}
.wc-date{font-size:8px;color:var(--text-muted);margin-bottom:2px}
.wc-score-lbl{font-size:7px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-top:1px}
.week-cell.active .wc-date{color:rgba(255,255,255,.5)}
.week-cell.active .wc-score-lbl{color:rgba(255,255,255,.4)}

/* ── Day panel ── */
.day-panel{display:none}
.day-panel.active{display:block}
.wx-card{background:var(--white);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.wx-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.wx-icon{font-size:32px}
.wx-info{flex:1}
.wx-day{font-size:14px;font-weight:600}
.wx-desc{font-size:12px;color:var(--text-muted)}
.wx-score-pill{color:#fff;font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;border-radius:12px;padding:8px 14px;text-align:center;flex-shrink:0}
.wx-score-sub{font-size:9px;font-weight:400;opacity:.9;display:block}
.wx-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.wx-tile{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.wx-tile-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.wx-tile-value{font-size:20px;font-weight:700;color:var(--text);margin-top:2px;word-break:break-word;overflow-wrap:break-word;white-space:normal}
.wx-tile-sub{font-size:10px;color:var(--text-muted);margin-top:1px}
.wx-detail{font-size:12px;color:var(--text-muted);line-height:1.5;margin-top:8px}

/* ── Tide cards ── */
.tide-card{background:var(--white);border-radius:var(--radius-sm);padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:10px}
.tide-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.tide-row:last-child{border-bottom:none}
.tide-type{font-size:13px;font-weight:500}
.tide-time{font-size:11px;color:var(--text-muted);margin-top:1px}
.tide-ht{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700}

/* ── 14-day section ── */
.extended-header{display:flex;align-items:center;gap:10px;background:var(--ocean);border-radius:var(--radius-sm);padding:12px 16px;margin:20px 0 12px}
.extended-header-icon{font-size:24px}
.extended-header-text .ext-title{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:#fff;letter-spacing:.5px}
.extended-header-text .ext-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}


/* ── Tide graph drawer ── */
.tide-drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.tide-drawer-overlay.open{opacity:1;pointer-events:all}
.tide-drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:301;transition:transform .35s cubic-bezier(.4,0,.2,1);padding-bottom:env(safe-area-inset-bottom);max-height:88vh;overflow-y:auto}
.tide-drawer.open{transform:translateX(-50%) translateY(0)}
.tide-drawer-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.tide-drawer-body{padding:16px 20px 28px}
.tide-row{cursor:pointer;transition:background .15s;border-radius:6px;padding:8px 6px;margin:0 -6px;border-bottom:1px solid var(--border)}
.tide-row:last-child{border-bottom:none}
.tide-row:hover{background:var(--bg)}
.tide-row-tap-hint{font-size:10px;color:var(--text-muted);text-align:center;padding:6px 0 2px;font-style:italic}
/* ── Loading / error ── */
.loading-state{padding:40px 20px;text-align:center;color:var(--text-muted)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--ocean);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{background:var(--white);border-radius:var(--radius-sm);padding:24px;text-align:center;margin-top:8px}

/* ── Bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav-h);background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;text-decoration:none;color:var(--text-muted);font-size:10px;font-family:'DM Sans',sans-serif;transition:color .2s}
.nav-item.active{color:var(--ocean)}
.nav-icon{font-size:22px;line-height:1}
</style>
</head>

<script>
var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Favorites ─────────────────────────────────────────────────
function getFavs() {
  try { return JSON.parse(localStorage.getItem('fs_favspots') || '[]'); } catch(e) { return []; }
}
function saveFavs(favs) {
  try { localStorage.setItem('fs_favspots', JSON.stringify(favs)); } catch(e) {}
}
function toggleFav(name, lat, lng) {
  var favs = getFavs();
  var idx = favs.findIndex(function(f) { return f.name === name; });
  if (idx >= 0) {
    favs.splice(idx, 1);
  } else {
    favs.push({ name: name, lat: lat, lng: lng });
  }
  saveFavs(favs);
  renderFavsBar();
  updateStarIcons();
}
function isFav(name) {
  return getFavs().some(function(f) { return f.name === name; });
}
function updateStarIcons() {
  var favs = getFavs();
  document.querySelectorAll('.spot-star').forEach(function(el) {
    var spotBtn = el.closest('.spot-btn');
    if (!spotBtn) return;
    var spotName = spotBtn.querySelector('span:first-child').textContent.trim();
    // match against fav names (partial — preset names may differ)
    var favName = favs.find(function(f) {
      return f.name.toLowerCase().includes(spotName.toLowerCase()) || spotName.toLowerCase().includes(f.name.toLowerCase().split(' ')[0]);
    });
    el.textContent = favName ? '⭐' : '☆';
    el.style.opacity = favName ? '1' : '0.7';
  });
}
function renderFavsBar() {
  var favs = getFavs();
  var section = document.getElementById('favsSection');
  var row = document.getElementById('favsRow');
  if (!favs.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  row.innerHTML = favs.map(function(f) {
    return '<div class="fav-chip" onclick="loadSpot(\'' + f.name.replace(/'/g,"\\'") + '\',' + f.lat + ',' + f.lng + ')">'
      + '⭐ ' + f.name
      + '<span class="fav-chip-remove" onclick="event.stopPropagation();toggleFav(\'' + f.name.replace(/'/g,"\\'") + '\',' + f.lat + ',' + f.lng + ')" title="Remove">×</span>'
      + '</div>';
  }).join('');
}

// ── Save searched location as potential favorite ──────────────
function offerSaveLocation(name, lat, lng) {
  // Add a "save this spot" button after loading — shown in content area header
  var existing = document.getElementById('saveLocBtn');
  if (existing) existing.remove();
  var btn = document.createElement('button');
  btn.id = 'saveLocBtn';
  var already = isFav(name);
  btn.style.cssText = 'display:flex;align-items:center;gap:6px;background:'+(already?'rgba(82,183,136,.15)':'var(--white)')+';border:1.5px solid '+(already?'var(--kelp-light)':'var(--border)')+';color:'+(already?'#2d7d46':'var(--text-muted)')+';border-radius:100px;padding:6px 14px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:14px';
  btn.innerHTML = (already ? '⭐ Saved to My Spots' : '☆ Save to My Spots');
  btn.onclick = function() {
    toggleFav(name, lat, lng);
    var nowFav = isFav(name);
    btn.innerHTML = nowFav ? '⭐ Saved to My Spots' : '☆ Save to My Spots';
    btn.style.background = nowFav ? 'rgba(82,183,136,.15)' : 'var(--white)';
    btn.style.borderColor = nowFav ? 'var(--kelp-light)' : 'var(--border)';
    btn.style.color = nowFav ? '#2d7d46' : 'var(--text-muted)';
  };
  var content = document.getElementById('content');
  content.insertBefore(btn, content.firstChild);
}

// ── Utility ───────────────────────────────────────────────────
function showLoading(msg) {
  document.getElementById('content').innerHTML =
    '<div class="loading-state"><div class="spinner"></div><div>' + (msg || 'Loading…') + '</div></div>';
}
function showError(msg) {
  document.getElementById('content').innerHTML =
    '<div class="error-state"><div style="font-size:32px;margin-bottom:8px">🌊</div>'
    + '<div style="font-weight:600;margin-bottom:6px">Could not load forecast</div>'
    + '<div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">' + (msg||'Check connection and try again.') + '</div>'
    + '<button onclick="useGPS()" style="padding:10px 24px;background:var(--ocean);color:#fff;border:none;border-radius:8px;font-family:inherit;cursor:pointer">Try My Location</button>'
    + '</div>';
}

var STATE_HINTS = {
  'california':'California','ca':'California','oregon':'Oregon','or':'Oregon',
  'washington':'Washington','wa':'Washington','nevada':'Nevada','nv':'Nevada',
  'arizona':'Arizona','az':'Arizona','hawaii':'Hawaii','hi':'Hawaii',
  'alaska':'Alaska','ak':'Alaska','florida':'Florida','fl':'Florida',
  'texas':'Texas','tx':'Texas','montana':'Montana','mt':'Montana',
  'idaho':'Idaho','id':'Idaho','utah':'Utah','ut':'Utah',
  'colorado':'Colorado','co':'Colorado','wyoming':'Wyoming','wy':'Wyoming',
};
function detectStateHint(query) {
  var q = query.toLowerCase().replace(/[,\.]/g,' ').trim();
  var parts = q.split(/\s+/);
  var last = parts[parts.length-1];
  if (STATE_HINTS[last]) return STATE_HINTS[last];
  if (parts.length >= 2) { var lt = parts.slice(-2).join(' '); if (STATE_HINTS[lt]) return STATE_HINTS[lt]; }
  return null;
}

async function searchLocation() {
  var q = document.getElementById('locInput').value.trim();
  if (!q) return;
  showLoading('Searching for ' + q + '…');
  try {
    var regionCfg = (typeof getRegionConfig==='function') ? getRegionConfig() : {admin1:'California',country_code:'US',name:'California'};
    var explicitState = detectStateHint(q);
    var searchQ = q;
    if (explicitState) {
      var statePattern = new RegExp('\\s*,?\\s*('+explicitState+'|'+Object.keys(STATE_HINTS).filter(function(k){return STATE_HINTS[k]===explicitState;}).join('|')+')\\s*$','i');
      searchQ = q.replace(statePattern,'').trim() || q;
    }
    var res = await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(searchQ)+'&count=10&language=en&format=json');
    var data = await res.json();
    if (!data.results || !data.results.length) {
      var retryQ = explicitState ? searchQ+' '+explicitState : searchQ+' '+regionCfg.name;
      var res2 = await fetch('https://geocoding-api.open-meteo.com/v1/search?name='+encodeURIComponent(retryQ)+'&count=5&language=en&format=json');
      var data2 = await res2.json();
      if (!data2.results || !data2.results.length) { showError('Location not found. Try a nearby city.'); return; }
      data = data2;
    }
    var qLower = q.toLowerCase();
    var scored = data.results.map(function(r) {
      var score = 0;
      var admin = (r.admin1||'').toLowerCase();
      if (explicitState) { if (admin===explicitState.toLowerCase()) score+=150; else if ((r.country_code||'').toUpperCase()==='US') score+=5; }
      else { if (admin===regionCfg.admin1.toLowerCase()) score+=100; else if ((r.country_code||'').toUpperCase()===regionCfg.country_code) score+=15; }
      if (r.name.toLowerCase()===qLower) score+=50;
      else if (r.name.toLowerCase().startsWith(qLower)) score+=25;
      if (r.population) score+=Math.min(r.population/10000,20);
      return {r:r,score:score};
    });
    scored.sort(function(a,b){return b.score-a.score;});
    var best = scored[0].r;
    var locName = best.name+(best.admin1?', '+best.admin1:'')+(best.country_code!=='US'?', '+best.country_code:'');
    await loadSpot(locName, best.latitude, best.longitude);
  } catch(e) { showError('Search failed. Check your connection.'); }
}

function useGPS() {
  if (!navigator.geolocation) { showError('Location not supported on this device.'); return; }
  showLoading('Getting your location…');
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      try { localStorage.setItem('fs_used_gps','1'); } catch(e){}
      loadSpot('My Location', pos.coords.latitude, pos.coords.longitude);
    },
    function(err) {
      if (err.code === 1) showError('Location access denied. Enable location in browser settings, or search a spot above.');
      else showError('Could not get your location. Try searching a spot above.');
    },
    { timeout: 8000, maximumAge: 60000 }
  );
}

async function loadSpot(locName, lat, lng) {
  showLoading('Loading forecast for '+locName+'…');
  try {
    if (typeof nearestStation==='undefined') { showError('App script failed to load. Please hard-refresh.'); return; }
    var station = nearestStation(lat, lng);
    var today = new Date();
    var ds = today.toISOString().split('T')[0].replace(/-/g,'');
    var end14 = new Date(today); end14.setDate(today.getDate()+13);
    var de = end14.toISOString().split('T')[0].replace(/-/g,'');
    var tideUrl = 'https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?begin_date='+ds+'&end_date='+de
      +'&station='+station.id+'&product=predictions&datum=MLLW&time_zone=lst_ldt&interval=hilo&units=english&application=fishsmarter&format=json';

    var tideData = {predictions:[]};
    var forecast = null, hourly = null, pressureTrend = null;

    try {
      var tideRes = await fetch(tideUrl);
      tideData = await tideRes.json();
    } catch(e) { console.error('[FS] Tides error:', e.message); }

    try {
      var wxPointRes = await fetch('https://api.weather.gov/points/'+lat.toFixed(4)+','+lng.toFixed(4),
        {headers:{'User-Agent':'FishSmarterApp/1.0 (fishsmarter.app)','Accept':'application/geo+json'}});
      if (wxPointRes.ok) {
        var wxPoint = await wxPointRes.json();
        if (wxPoint.properties && wxPoint.properties.forecast) {
          var fRes = await fetch(wxPoint.properties.forecast);
          var hRes = await fetch(wxPoint.properties.forecastHourly);
          if (fRes.ok) { var fData = await fRes.json(); forecast = fData.properties && fData.properties.periods; }
          if (hRes.ok) { var hData = await hRes.json(); hourly = hData.properties && hData.properties.periods; }
        }
      }
    } catch(e) { console.error('[FS] Weather error:', e.message); }

    try {
      var pmUrl = 'https://api.open-meteo.com/v1/forecast?latitude='+lat.toFixed(4)
        +'&longitude='+lng.toFixed(4)+'&hourly=pressure_msl&past_hours=4&forecast_days=1&timezone=GMT';
      var pmRes = await fetch(pmUrl);
      if (pmRes.ok) {
        var pmData = await pmRes.json();
        var allP = pmData.hourly && pmData.hourly.pressure_msl ? pmData.hourly.pressure_msl : [];
        // First 4 entries are the past_hours readings (chronological, oldest first)
        var recentP = allP.slice(0, 4).filter(function(v) { return v != null; });
        pressureTrend = calcPressureTrend(recentP);
      }
    } catch(e) { console.error('[FS] Pressure error:', e.message); }

    if (!tideData.predictions || !tideData.predictions.length) {
      showError('Could not load tide data. NOAA service may be temporarily unavailable — try again shortly.');
      return;
    }
    renderForecast(locName, lat, lng, station, tideData, forecast, hourly, pressureTrend);
    offerSaveLocation(locName, lat, lng);
    renderFavsBar();
    updateStarIcons();
  } catch(e) { showError('Could not load forecast: '+e.message); }
}

function renderForecast(locName, lat, lng, station, tideData, forecast, hourly, pressureTrend) {
  _tideDrawerData = [];
  _tideDrawerIdx = 0;
  var tidesByDate = {};
  (tideData.predictions||[]).forEach(function(t) {
    var dk = t.t.split(' ')[0];
    if (!tidesByDate[dk]) tidesByDate[dk] = [];
    tidesByDate[dk].push(t);
  });

  // Build one entry per calendar date — fixes missing days when NWS starts with a night period
  var byDate = {};
  if (forecast) {
    forecast.forEach(function(p) {
      var dk = p.startTime.split('T')[0];
      if (!byDate[dk]) byDate[dk] = {day:null,night:null};
      if (p.isDaytime) byDate[dk].day = p; else byDate[dk].night = p;
    });
  }
  var todayLocal = new Date();
  var todayKey = todayLocal.getFullYear()+'-'
    +String(todayLocal.getMonth()+1).padStart(2,'0')+'-'
    +String(todayLocal.getDate()).padStart(2,'0');
  var fcDateKeys = Object.keys(byDate).sort().filter(function(k){return k>=todayKey;});
  var dayForecasts = fcDateKeys.map(function(k){return byDate[k].day||byDate[k].night;}).filter(Boolean);
  var nightForecasts = fcDateKeys.map(function(k){return byDate[k].night;});

  var now = new Date();
  var current = null;
  if (hourly && hourly.length) {
    current = hourly.find(function(p) {
      return new Date(p.startTime) <= now && new Date(p.endTime) > now;
    }) || hourly[0];
  }
  var todayF = dayForecasts[0];
  var curTemp = current ? parseInt(current.temperature) : (todayF ? todayF.temperature : null);
  var curWind = current ? current.windSpeed : (todayF ? todayF.windSpeed : 'N/A');
  var curFcast = current ? current.shortForecast : (todayF ? todayF.shortForecast : '');
  var todayTideKey = fcDateKeys[0] || '';
  var todayTides = tidesByDate[todayTideKey] || [];
  var todayMoon = getMoonPhase(new Date());
  var todayScore = calcFishingScore(curTemp, curWind, curFcast, todayTides, new Date(), pressureTrend, todayMoon);

  var html = '';

  // Location line
  html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">'
    +'📍 '+locName+' · Tide station: '+station.name+'</div>';

  // Today score card
  html += '<div class="score-card" id="scoreBanner" style="background:'+scoreColor(todayScore)+'">'
    +'<div class="score-num" id="scoreNum">'+todayScore+'</div>'
    +'<div><div class="score-info-title" id="scoreTitle">Today\'s Fishing Score</div>'
    +'<div class="score-info-sub" id="scoreSub">'+todayMoon.emoji+' '+scoreDesc(todayScore)
    +(curTemp?' · '+curTemp+'°F':'')
    +' · '+curWind+' · '+curFcast+'</div></div></div>';

  // ── Score info disclosure ─────────────────────────────────
  html += '<button onclick="toggleScoreInfo()" style="background:none;border:none;font-size:11px;color:var(--text-muted);cursor:pointer;padding:2px 0 14px;display:flex;align-items:center;gap:4px;font-family:DM Sans,sans-serif;">';
  html += '<span style="font-size:14px">&#9432;</span> How is this score calculated?';
  html += '</button>';
  html += '<div id="scoreInfoPanel" style="display:none;background:var(--off-white);border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:16px;">';
  html += '<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px">What goes into the score</div>';
  html += '<div style="display:flex;flex-direction:column;gap:7px;margin-bottom:14px">';
  html += scoreInfoRow('&#127777; Air temperature', 'included', '#e8f5ee', '#2d7d46');
  html += scoreInfoRow('&#128168; Wind speed', 'included', '#e8f5ee', '#2d7d46');
  html += scoreInfoRow('&#127780; Weather condition', 'included', '#e8f5ee', '#2d7d46');
  html += scoreInfoRow('&#127754; Tide state (incoming vs outgoing)', 'included', '#e8f5ee', '#2d7d46');
  html += scoreInfoRow('&#128336; Time of day (dawn & dusk bonus)', 'included', '#e8f5ee', '#2d7d46');
  html += scoreInfoRow('&#128200; Barometric pressure trend', 'included', '#e8f5ee', '#2d7d46');
  html += scoreInfoRow('&#127769; Moon phase', 'included', '#e8f5ee', '#2d7d46');
  html += '</div>';
  html += '<div style="border-top:1px solid var(--border);padding-top:12px;margin-bottom:12px">';
  html += '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px">Not yet factored in</div>';
  html += '<div style="display:flex;flex-direction:column;gap:7px">';
  html += scoreInfoRow('&#127777; Water temperature', 'not included', '#f0f4f8', '#5a6473');
  html += scoreInfoRow('&#129416; Species-specific behavior', 'not included', '#f0f4f8', '#5a6473');
  html += '</div></div>';
  html += '<div style="background:#fff3cd;border-left:3px solid #f0a500;border-radius:6px;padding:10px 12px;font-size:11px;color:#7a4f00;line-height:1.6">';
  html += 'This score is a general guide, not a guarantee of fish activity. ';
  html += 'Local knowledge, recent reports, and your own experience are the best inputs. ';
  html += 'Always verify conditions before heading out.';
  html += '</div>';
  html += '</div>';

  if (dayForecasts.length > 0) {

    // Build per-day score data for live score card updates on day switch
    var daySummaries = dayForecasts.slice(0,7).map(function(p,i) {
      var d = new Date(fcDateKeys[i]+'T12:00:00');
      var t = tidesByDate[fcDateKeys[i]] || [];
      var moonForDay = getMoonPhase(d);
      var sc = (i === 0) ? todayScore : calcFishingScore(p.temperature, p.windSpeed, p.shortForecast, t, d, null, moonForDay);
      var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var monNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      // Score card title: "Today's" / "Tomorrow's" take possessive; named days don't
      var shortLabel = i===0 ? 'Today' : i===1 ? 'Tomorrow' : dayNames[d.getDay()]+', '+monNames[d.getMonth()]+' '+d.getDate();
      var moonEmoji = i === 0 ? todayMoon.emoji : moonForDay.emoji;
      var sub = moonEmoji + ' ' + scoreDesc(sc) + (p.temperature ? ' · ' + p.temperature + '°F' : '') + ' · ' + p.windSpeed + ' · ' + p.shortForecast;
      return { score: sc, label: shortLabel, sub: sub, color: scoreColor(sc) };
    });
    window._daySummaries = daySummaries;

    // ── 7-day grid ────────────────────────────────────────────
    html += '<div class="section-label">7-Day Forecast</div>';
    html += '<div class="week-grid" id="weekGrid">';
    dayForecasts.slice(0,7).forEach(function(p,i) {
      var d = new Date(fcDateKeys[i]+'T12:00:00');
      var cellTides = tidesByDate[fcDateKeys[i]] || [];
      // Use todayScore for today's cell so it matches the score card (both use current hourly data)
      var s = (i === 0) ? todayScore : calcFishingScore(p.temperature, p.windSpeed, p.shortForecast, cellTides, d, null, getMoonPhase(d));
      var topLabel = i===0 ? 'Today' : i===1 ? 'Tmrw' : DAYS[d.getDay()];
      var dateLabel = (d.getMonth()+1)+'/'+d.getDate();
      html += '<div class="week-cell'+(i===0?' active':'')+'" id="wcell'+i+'" onclick="switchDay('+i+')">'
        +'<div class="wc-label">'+topLabel+'</div>'
        +'<div class="wc-date">'+dateLabel+'</div>'
        +'<div class="wc-icon">'+getWxIcon(p.shortForecast)+'</div>'
        +'<div class="wc-score" style="color:'+scoreColor(s)+'">'+s+'</div>'
        +'<div class="wc-score-lbl">score</div>'
        +'</div>';
    });
    html += '</div>';

    // ── Day panels ────────────────────────────────────────────
    dayForecasts.slice(0,7).forEach(function(p,i) {
      var d = new Date(fcDateKeys[i]+'T12:00:00');
      var night = nightForecasts[i];
      var panelTides = tidesByDate[fcDateKeys[i]] || [];
      // Use todayScore for today's panel header so it matches the score card
      var s = (i === 0) ? todayScore : calcFishingScore(p.temperature, p.windSpeed, p.shortForecast, panelTides, d, null, getMoonPhase(d));
      var dateKey = fcDateKeys[i];
      var dateStr = MONTHS[d.getMonth()]+' '+d.getDate();
      var label = i===0 ? 'Today · '+dateStr : i===1 ? 'Tomorrow · '+dateStr
        : DAYS[d.getDay()]+' '+dateStr;

      html += '<div class="day-panel'+(i===0?' active':'')+'" id="dpanel'+i+'">';

      // Weather card
      html += '<div class="wx-card">'
        +'<div class="wx-header">'
        +'<span class="wx-icon">'+getWxIcon(p.shortForecast)+'</span>'
        +'<div class="wx-info"><div class="wx-day">'+label+'</div>'
        +'<div class="wx-desc">'+p.shortForecast+' · '+p.windSpeed+' '+p.windDirection+'</div></div>'
        +'<div class="wx-score-pill" style="background:'+scoreColor(s)+'">'+s
        +'<span class="wx-score-sub">'+scoreDesc(s)+'</span></div>'
        +'</div>'
        +'<div class="wx-grid">'
        +'<div class="wx-tile"><div class="wx-tile-label">High Temp</div>'
        +'<div class="wx-tile-value">'+p.temperature+'°</div></div>'
        +'<div class="wx-tile"><div class="wx-tile-label">Wind</div>'
        +'<div class="wx-tile-value" style="font-size:14px">'+p.windSpeed+'</div>'
        +'<div class="wx-tile-sub">'+p.windDirection+'</div></div>';
      if (night) {
        html += '<div class="wx-tile"><div class="wx-tile-label">Tonight</div>'
          +'<div class="wx-tile-value">'+night.temperature+'°</div></div>';
      }
      html += '</div>';
      if (p.detailedForecast) html += '<div class="wx-detail">'+p.detailedForecast+'</div>';
      html += '</div>';

      // Tides for this day
      html += '<div class="section-label">Tides — '+station.name+'</div>';
      html += '<div class="tide-card">';
      if (dayTides.length) {
        html += '<div style="font-size:10px;color:var(--text-muted);text-align:center;padding:4px 0 6px;font-style:italic">Tap a row to see tide chart</div>';
        var _isToday = (i===0);
        dayTides.forEach(function(t) {
          html += buildTideRow(t, dayTides, _isToday);
        });
      } else {
        html += '<div style="font-size:13px;color:var(--text-muted);padding:8px">No tide data for this day</div>';
      }
      html += '</div>';
      html += '</div>'; // end day-panel
    });
  }

  // ── Extended 14-day section ───────────────────────────────
  var extKeys = Object.keys(tidesByDate).sort().slice(7,14);
  if (extKeys.length) {
    html += '<div class="extended-header">'
      +'<div class="extended-header-icon">📅</div>'
      +'<div class="extended-header-text">'
      +'<div class="ext-title">Days 8–14 · Tide Forecast</div>'
      +'<div class="ext-sub">Weather data unavailable beyond 7 days · Tide predictions only</div>'
      +'</div></div>';

    extKeys.forEach(function(dk) {
      var d = new Date(dk+'T12:00:00');
      var ts = tidesByDate[dk];
      if (!ts||!ts.length) return;

        +'<div style="font-size:13px;font-weight:600;margin-bottom:8px">'
        +DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate()+'</div>';

  }

// Store tides by date for drawer lookup
var _tideDrawerData = [];
var _tideDrawerIdx = 0;

function buildTideRow(t, allDayTides, isToday) {
  var isH = t.type === 'H';
  var parts = t.t.split(' ')[1].split(':');
  var h = parseInt(parts[0]), mn = parts[1];
  var ampm = h >= 12 ? 'PM' : 'AM';
  var h12 = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  var idx = _tideDrawerIdx++;
  _tideDrawerData[idx] = {tides: allDayTides, clickedT: t, isToday: !!isToday};
  var col = isH ? '#1a6390' : '#e07b39';
  var arrow = isH ? '&uarr;' : '&darr;';
  var label = isH ? 'High Tide' : 'Low Tide';
  var ht = parseFloat(t.v).toFixed(1);
  var onclick = 'openTideDrawer(' + idx + ')';
  var html = '<div class="tide-row" onclick="' + onclick + '" title="Tap to see tide chart">';
  html += '<div style="display:flex;align-items:center;gap:10px">';
  html += '<div style="width:32px;height:32px;border-radius:8px;background:' + col + ';display:flex;align-items:center;justify-content:center;flex-shrink:0">';
  html += '<span style="font-size:16px;font-weight:700;color:#fff;line-height:1">' + arrow + '</span>';
  html += '</div>';
  html += '<div><div class="tide-type">' + label + '</div>';
  html += '<div class="tide-time">' + h12 + ':' + mn + ' ' + ampm + '</div></div>';
  html += '</div>';
  html += '<div style="display:flex;align-items:center;gap:8px">';
  html += '<div class="tide-ht" style="color:' + col + '">' + ht + ' ft</div>';
  html += '<span style="font-size:16px;color:var(--text-muted);opacity:.5">&#8250;</span>';
  html += '</div></div>';
  return html;
}

// ── Tide graph drawer ─────────────────────────────────────────
function openTideDrawer(dataId) {
  var d = _tideDrawerData[dataId];
  if (!d) return;
  var tides = d.tides;
  var isToday = d.isToday;

  // Date label from first tide entry
  var dateStr = tides[0].t.split(' ')[0];
  var dp = new Date(dateStr+'T12:00:00');
  var DAYS2 = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MONTHS2 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var dayLabel = (isToday ? 'Today · ' : DAYS2[dp.getDay()]+' · ')
    + MONTHS2[dp.getMonth()]+' '+dp.getDate();

  // ── Sine interpolation ──────────────────────────────────────
  // Parse hi/lo times into minutes-since-midnight + heights
  function parseMinutes(tStr) {
    var p = tStr.split(' ')[1].split(':');
    return parseInt(p[0])*60 + parseInt(p[1]);
  }
  var points = tides.map(function(t) {
    return { m: parseMinutes(t.t), h: parseFloat(t.v), isH: t.type==='H' };
  }).sort(function(a,b){return a.m-b.m;});

  // Extend with virtual prev/next points to anchor the sine at day boundaries
  // by mirroring the first/last point across midnight
  var extended = [];
  if (points.length > 0) {
    var first = points[0], last = points[points.length-1];
    // Virtual point before 0:00 — mirror of first real point
    extended.push({ m: first.m - 2*(first.m), h: first.h, isH: !first.isH, virtual: true });
  }
  extended = extended.concat(points);
  if (points.length > 0) {
    var lastP = points[points.length-1];
    extended.push({ m: lastP.m + 2*(1440-lastP.m), h: lastP.h, isH: !lastP.isH, virtual: true });
  }

  // Interpolate height at any minute using cosine between adjacent hi/lo pairs
  function heightAt(min) {
    for (var i = 0; i < extended.length-1; i++) {
      var a = extended[i], b = extended[i+1];
      if (min >= a.m && min <= b.m) {
        var t = (min - a.m) / (b.m - a.m);
        // Cosine interpolation
        var ct = (1 - Math.cos(Math.PI * t)) / 2;
        return a.h + (b.h - a.h) * ct;
      }
    }
    return extended[extended.length-1].h;
  }

  // Sample every 15 minutes across the day
  var samples = [];
  for (var min = 0; min <= 1440; min += 15) {
    samples.push({ m: min, h: heightAt(min) });
  }

  var allH = samples.map(function(s){return s.h;});
  var minH = Math.min.apply(null, allH);
  var maxH = Math.max.apply(null, allH);
  var range = maxH - minH || 1;

  // ── SVG dimensions ──────────────────────────────────────────
  var W = 440, H = 180, PL = 36, PR = 16, PT = 16, PB = 32;
  var gW = W - PL - PR, gH = H - PT - PB;

  function xOf(m)  { return PL + (m / 1440) * gW; }
  function yOf(ht) { return PT + gH - ((ht - minH) / range) * gH; }

  // Build smooth SVG path
  var path = '';
  var areaPath = '';
  samples.forEach(function(s, i) {
    var x = xOf(s.m).toFixed(1), y = yOf(s.h).toFixed(1);
    if (i === 0) { path += 'M'+x+','+y; areaPath += 'M'+x+','+(PT+gH)+' L'+x+','+y; }
    else { path += ' L'+x+','+y; areaPath += ' L'+x+','+y; }
  });
  areaPath += ' L'+xOf(1440).toFixed(1)+','+(PT+gH)+' Z';

  // Time axis labels
  var axisLabels = ['12a','3a','6a','9a','12p','3p','6p','9p','12a'];
  var axisMins   = [0, 180, 360, 540, 720, 900, 1080, 1260, 1440];

  // Current time line (today only)
  var nowMin = -1;
  if (isToday) {
    var now = new Date();
    nowMin = now.getHours()*60 + now.getMinutes();
  }

  // Build SVG
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg">';
  // Defs: gradient fill
  svg += '<defs>'
    +'<linearGradient id="tideGrad" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="#1a6390" stop-opacity="0.25"/>'
    +'<stop offset="100%" stop-color="#1a6390" stop-opacity="0.03"/>'
    +'</linearGradient></defs>';

  // Grid lines
  for (var gi = 0; gi <= 4; gi++) {
    var gy = PT + (gi/4)*gH;
    svg += '<line x1="'+PL+'" y1="'+gy.toFixed(1)+'" x2="'+(PL+gW)+'" y2="'+gy.toFixed(1)+'" stroke="#dce3ea" stroke-width="0.5"/>';
  }

  // Area fill + curve
  svg += '<path d="'+areaPath+'" fill="url(#tideGrad)"/>';
  svg += '<path d="'+path+'" fill="none" stroke="#1a6390" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';

  // Hi/Lo markers
  points.forEach(function(p) {
    var x = xOf(p.m), y = yOf(p.h);
    var col = p.isH ? '#1a6390' : '#e07b39';
    svg += '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="4" fill="'+col+'" stroke="#fff" stroke-width="1.5"/>';
    // Height label
    var labelY = p.isH ? y - 8 : y + 14;
    svg += '<text x="'+x.toFixed(1)+'" y="'+labelY.toFixed(1)+'" text-anchor="middle" font-size="9" font-family="DM Sans,sans-serif" font-weight="600" fill="'+col+'">'+p.h.toFixed(1)+'ft</text>';
    // Time label
    var hh = Math.floor(p.m/60), mm2 = p.m%60;
    var ap = hh>=12?'p':'a', h12t = hh>12?hh-12:(hh===0?12:hh);
    var tLabel = h12t+':'+(mm2<10?'0':'')+mm2+ap;
    var tlY = p.isH ? y - 18 : y + 24;
    svg += '<text x="'+x.toFixed(1)+'" y="'+tlY.toFixed(1)+'" text-anchor="middle" font-size="8" font-family="DM Sans,sans-serif" fill="#5a6473">'+tLabel+'</text>';
  });

  // Current time line
  if (nowMin >= 0 && nowMin <= 1440) {
    var nx = xOf(nowMin);
    svg += '<line x1="'+nx.toFixed(1)+'" y1="'+PT+'" x2="'+nx.toFixed(1)+'" y2="'+(PT+gH)+'" stroke="#52b788" stroke-width="1.5" stroke-dasharray="3,3"/>';
    svg += '<circle cx="'+nx.toFixed(1)+'" cy="'+yOf(heightAt(nowMin)).toFixed(1)+'" r="5" fill="#52b788" stroke="#fff" stroke-width="1.5"/>';
    svg += '<text x="'+nx.toFixed(1)+'" y="'+(PT-4)+'" text-anchor="middle" font-size="8" font-family="DM Sans,sans-serif" font-weight="600" fill="#52b788">Now</text>';
  }

  // X axis labels
  axisLabels.forEach(function(lbl, li) {
    var ax = xOf(axisMins[li]);
    svg += '<text x="'+ax.toFixed(1)+'" y="'+(PT+gH+12)+'" text-anchor="middle" font-size="8" font-family="DM Sans,sans-serif" fill="#5a6473">'+lbl+'</text>';
  });

  // Y axis labels
  var yTicks = [minH, (minH+maxH)/2, maxH];
  yTicks.forEach(function(yt) {
    var ay = yOf(yt);
    svg += '<text x="'+(PL-4)+'" y="'+(ay+3).toFixed(1)+'" text-anchor="end" font-size="8" font-family="DM Sans,sans-serif" fill="#5a6473">'+yt.toFixed(1)+'</text>';
  });

  svg += '</svg>';

  // Legend
  var legend = '<div style="display:flex;gap:16px;align-items:center;margin-top:12px;flex-wrap:wrap">'
    +'<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:50%;background:#1a6390"></div><span style="font-size:11px;color:var(--text-muted)">High tide</span></div>'
    +'<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:50%;background:#e07b39"></div><span style="font-size:11px;color:var(--text-muted)">Low tide</span></div>'
    +(isToday?'<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:2px;background:#52b788;border-radius:1px"></div><span style="font-size:11px;color:var(--text-muted)">Current time</span></div>':'')
    +'</div>';

  // Tide list summary
  var list = '<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px">';
  points.forEach(function(p) {
    var col = p.isH ? '#1a6390' : '#e07b39';
    var hh = Math.floor(p.m/60), mm2 = p.m%60;
    var ap = hh>=12?'PM':'AM', h12t = hh>12?hh-12:(hh===0?12:hh);
    list += '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<div style="width:28px;height:28px;border-radius:7px;background:'+col+';display:flex;align-items:center;justify-content:center">'
      +'<span style="font-size:13px;font-weight:700;color:#fff;line-height:1">'+(p.isH?'↑':'↓')+'</span></div>'
      +'<div><div style="font-size:13px;font-weight:500">'+(p.isH?'High':'Low')+' Tide</div>'
      +'<div style="font-size:11px;color:var(--text-muted)">'+h12t+':'+(mm2<10?'0':'')+mm2+' '+ap+'</div>'
      +'</div></div>'
      +'<div style="font-family:Unbounded,sans-serif;font-size:15px;font-weight:700;color:'+col+'">'+p.h.toFixed(1)+' ft</div>'
      +'</div>';
  });
  list += '</div>';

  document.getElementById('tideDrawerBody').innerHTML =
    '<div style="font-family:Unbounded,sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px">🌊 '+dayLabel+'</div>'
    +'<div style="font-size:11px;color:var(--text-muted);margin-bottom:14px">Tap anywhere outside to close</div>'
    + svg + legend + list;

  document.getElementById('tideDrawerOverlay').classList.add('open');
  document.getElementById('tideDrawer').classList.add('open');
}

function closeTideDrawer() {
  document.getElementById('tideDrawerOverlay').classList.remove('open');
  document.getElementById('tideDrawer').classList.remove('open');
}


function switchDay(i) {
  document.querySelectorAll('.week-cell').forEach(function(c,idx) {
    c.classList.toggle('active', idx===i);
  });
  document.querySelectorAll('.day-panel').forEach(function(p,idx) {
    p.classList.toggle('active', idx===i);
  });
  // Update score card to reflect the selected day
  var sums = window._daySummaries;
  if (!sums || !sums[i]) return;
  var d = sums[i];
  var banner = document.getElementById('scoreBanner');
  var numEl  = document.getElementById('scoreNum');
  var titleEl = document.getElementById('scoreTitle');
  var subEl  = document.getElementById('scoreSub');
  if (banner) banner.style.background = d.color;
  if (numEl)  numEl.textContent = d.score;
  if (titleEl) {
    // "Today" and "Tomorrow" take possessive apostrophe; named days (e.g. "Mon, Apr 28") don't
    var lbl = d.label;
    if (lbl === 'Today' || lbl === 'Tomorrow') {
      titleEl.textContent = lbl + "'s Fishing Score";
    } else {
      titleEl.textContent = 'Fishing Score — ' + lbl;
    }
  }
  if (subEl)  subEl.textContent = d.sub;
}

// ── Mouse drag scroll for spots row ──────────────────────────
(function() {
  var el = document.getElementById('spotsRow');
  if (!el) return;
  var isDown=false, startX, scrollLeft;
  el.addEventListener('mousedown',function(e){isDown=true;el.style.cursor='grabbing';startX=e.pageX-el.offsetLeft;scrollLeft=el.scrollLeft;});
  el.addEventListener('mouseleave',function(){isDown=false;el.style.cursor='grab';});
  el.addEventListener('mouseup',function(){isDown=false;el.style.cursor='grab';});
  el.addEventListener('mousemove',function(e){if(!isDown)return;e.preventDefault();el.scrollLeft=scrollLeft-(e.pageX-el.offsetLeft-startX);});
})();


// Swipe down to close tide drawer
(function() {
  var td = document.getElementById('tideDrawer');
  var tsY = 0;
  if (!td) return;
  td.addEventListener('touchstart', function(e){ tsY = e.touches[0].clientY; }, {passive:true});
  td.addEventListener('touchend', function(e){ if (e.changedTouches[0].clientY - tsY > 80) closeTideDrawer(); }, {passive:true});
})();

// ── Pressure trend ───────────────────────────────────────────
// pressures: array of pressure_msl (hPa) readings, oldest first, from Open-Meteo
function calcPressureTrend(pressures) {
  if (!pressures || pressures.length < 2) return null;
  var recent = pressures[pressures.length - 1];
  var oldest = pressures[0];
  var delta = recent - oldest;
  var minP = Math.min.apply(null, pressures);
  if (delta < -3)                    return 'rapid_fall';      // front arriving — fish go deep
  if (delta < -0.5)                  return 'falling';         // pre-frontal frenzy
  if (delta > 1 && minP < 1009)     return 'rising_after_low'; // post-storm clearing
  if (delta > 0.5)                   return 'rising';          // gradual improvement
  if (recent >= 1013)                return 'steady_high';     // stable high — consistent
  return 'steady_low';                                         // stable but suppressed
}

// ── Score info helpers ───────────────────────────────────────
function scoreInfoRow(label, status, bgColor, textColor) {
  return '<div style="display:flex;justify-content:space-between;align-items:center">'
    +'<div style="font-size:12px;color:var(--text)">'+label+'</div>'
    +'<div style="font-size:11px;color:'+textColor+';background:'+bgColor+';padding:2px 9px;border-radius:100px;white-space:nowrap">'+status+'</div>'
    +'</div>';
}

function toggleScoreInfo() {
  var panel = document.getElementById('scoreInfoPanel');
  if (!panel) return;
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

// ── Init ──────────────────────────────────────────────────────
renderFavsBar();
updateStarIcons();
// Only auto-request GPS if user has previously granted it.
// Avoids infinite spinner when permission is blocked or dismissed.
// Never auto-spin on load. The initial HTML already shows the idle state.
// If user previously used GPS, quietly attempt it — but only replace content on success.
(function() {
  var usedGps = false;
  try { usedGps = localStorage.getItem('fs_used_gps') === '1'; } catch(e) {}
  if (usedGps && navigator.geolocation) {
    // Show a subtle "Locating…" note without the full spinner overlay
    var note = document.createElement('div');
    note.id = 'gps-note';
    note.style.cssText = 'font-size:12px;color:var(--text-muted);text-align:center;margin-top:12px';
    note.textContent = '📍 Locating…';
    var contentEl = document.getElementById('content');
    if (contentEl) contentEl.appendChild(note);

    navigator.geolocation.getCurrentPosition(
      function(pos) {
        var n = document.getElementById('gps-note');
        if (n) n.remove();
        try { localStorage.setItem('fs_used_gps','1'); } catch(e){}
        loadSpot('My Location', pos.coords.latitude, pos.coords.longitude);
      },
      function() {
        // Silently fail — just remove the note, keep idle state
        var n = document.getElementById('gps-note');
        if (n) n.remove();
      },
      { timeout: 8000, maximumAge: 60000 }
    );
  }
})();

    var initials = name.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2) || '👤';
    avatar.textContent = initials;
    avatar.style.background = 'rgba(82,183,136,.4)';
    avatar.style.fontSize = '12px';
    avatar.style.fontWeight = '700';
    avatar.style.color = '#fff';
    avatar.style.fontFamily = 'Unbounded,sans-serif';
  } else {
    avatar.textContent = '👤';
    avatar.style.background = 'rgba(255,255,255,.2)';
    avatar.style.fontSize = '16px';
  }
});
