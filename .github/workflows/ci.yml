name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JS syntax (acorn)
        run: |
          for f in js/app.js js/auth.js js/auth-sheet.js; do
            echo "Checking $f..."
            npx --yes acorn --ecma2020 --module "$f" > /dev/null
            echo "  OK"
          done

      - name: Check HTML syntax (html-validate)
        run: |
          echo '{"extends":[],"rules":{"no-dup-attr":"error","close-order":"error"}}' > .htmlvalidate.json
          npx --yes html-validate forecast.html catchlog.html catchlog-new.html

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    steps:
      - name: Check live URLs return HTTP 200
        run: |
          fail=0
          for url in \
            "https://fishsmarter.app" \
            "https://fishsmarter.app/forecast.html" \
            "https://fishsmarter.app/catchlog.html"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$url")
            if [ "$code" = "200" ]; then
              echo "OK    $url  ($code)"
            else
              echo "FAIL  $url  ($code)"
              fail=1
            fi
          done
          exit $fail

  api-health:
    name: API Health Check
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    steps:
      - name: Check /api/estimate-size.js endpoint exists
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
            -X HEAD "https://fishsmarter.app/api/estimate-size.js")
          echo "Status: $code"
          if [ "$code" = "404" ]; then
            echo "FAIL: endpoint not found"
            exit 1
          fi
          echo "OK: endpoint exists (405 Method Not Allowed is acceptable)"
