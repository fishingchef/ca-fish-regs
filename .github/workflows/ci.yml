name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check JS syntax (acorn)
        run: |
          for f in js/app.js js/auth.js js/auth-sheet.js; do
            echo "Checking $f..."
            npx --yes acorn --ecma2020 --module "$f" > /dev/null
            echo "  OK"
          done

      - name: Check HTML syntax (html-validate)
        run: |
          cat > .htmlvalidate.json << 'EOF'
          {
            "rules": {
              "no-missing-references": "error",
              "void-style": "error",
              "unrecognized-char-ref": "error",
              "close-order": "error",
              "element-permitted-content": "error"
            }
          }
          EOF
          npx --yes html-validate --config .htmlvalidate.json forecast.html catchlog.html catchlog-new.html map.html account.html index.html

      - name: Check div balance
        run: |
          node -e "
          const fs = require('fs');
          const files = ['forecast.html','catchlog.html','catchlog-new.html','map.html','account.html','index.html'];
          let failed = false;
          files.forEach(f => {
            const html = fs.readFileSync(f, 'utf8');
            const opens = (html.match(/<div/gi) || []).length;
            const closes = (html.match(/<\/div>/gi) || []).length;
            if (opens !== closes) {
              console.error('DIV MISMATCH in ' + f + ': ' + opens + ' opening vs ' + closes + ' closing');
              failed = true;
            } else {
              console.log('OK ' + f + ': ' + opens + ' divs balanced');
            }
          });
          if (failed) process.exit(1);
          "

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    steps:
      - name: Check live URLs return HTTP 200
        run: |
          fail=0
          for url in \
            "https://fishsmarter.app" \
            "https://fishsmarter.app/forecast.html" \
            "https://fishsmarter.app/catchlog.html"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$url")
            if [ "$code" = "200" ]; then
              echo "OK    $url  ($code)"
            else
              echo "FAIL  $url  ($code)"
              fail=1
            fi
          done
          exit $fail

  api-health:
    name: API Health Check
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    steps:
      - name: Check /api/estimate-size.js endpoint exists
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
            -X HEAD "https://fishsmarter.app/api/estimate-size.js")
          echo "Status: $code"
          if [ "$code" = "404" ]; then
            echo "FAIL: endpoint not found"
            exit 1
          fi
          echo "OK: endpoint exists (405 Method Not Allowed is acceptable)"
