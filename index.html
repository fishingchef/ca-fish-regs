<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fish Smarter — California Fishing Regulations & AI Species ID</title>
<meta name="description" content="Identify your catch with AI, check California fishing regulations, view MPA maps, and get 14-day tide forecasts. Smarter fishing intelligence for the modern angler.">
<meta property="og:title" content="Fish Smarter — Own Your Waters.">
<meta property="og:description" content="AI-powered fishing intelligence for the modern angler.">
<meta property="og:image" content="https://fishsmarter.app/icon-512.png">
<meta name="theme-color" content="#0a3d62">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fish Smarter">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ocean:#0a3d62; --ocean-mid:#1a5f8a; --ocean-light:#2980b9;
  --kelp:#2d6a4f; --kelp-light:#52b788;
  --danger:#c0392b; --warning:#f0a500; --success:#27ae60;
  --text:#1a1a2e; --text-muted:#5a6473;
  --bg:#f0f4f8; --white:#ffffff; --border:#dce3ea;
  --radius:16px; --radius-sm:10px;
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:var(--nav-h)}

/* ── Header ── */
.header{background:var(--ocean);padding:48px 20px 16px;position:relative;overflow:hidden}
.header-wave{position:absolute;inset:0;opacity:.06;background-image:repeating-linear-gradient(-45deg,transparent,transparent 20px,#fff 20px,#fff 22px)}
.header-content{position:relative;z-index:1}
.app-eyebrow{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:400;color:rgba(255,255,255,.5);letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
.app-name{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:16px;letter-spacing:-.5px}
.app-name span{color:var(--kelp-light)}
.search-wrap{background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;gap:8px;padding:0 14px}
.search-wrap input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 0}
.search-wrap input::placeholder{color:rgba(255,255,255,.6)}

/* ── Alert banner ── */
.alert-banner{background:#fff3cd;border-left:4px solid var(--warning);padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:13px;color:#7a4f00;cursor:pointer}
.alert-banner.danger{background:#fde8e8;border-color:var(--danger);color:#7a0000}

/* ── Filter tabs ── */
.tabs-wrap{background:var(--ocean);padding:0 16px 12px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.filter-tab{flex-shrink:0;padding:6px 14px;border-radius:100px;border:1.5px solid rgba(255,255,255,.3);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:rgba(255,255,255,.75);cursor:pointer;transition:all .2s}
.filter-tab.active{background:#fff;border-color:#fff;color:var(--ocean)}

/* ── Action bar ── */
.action-bar{padding:10px 16px;display:flex;gap:8px}
.btn-map{flex:1;padding:10px;background:var(--ocean);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}


/* ── GPS banner ── */


/* ── Species list ── */
.species-list{padding:8px 12px 16px}
.section-label{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;padding:8px 4px 6px}
.species-card{background:var(--white);border-radius:var(--radius-sm);margin-bottom:8px;display:flex;align-items:center;gap:12px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .2s;border-left:3px solid transparent}
.species-card:active{box-shadow:0 0 0 2px var(--ocean-light)}
.species-card.open{border-left-color:var(--success)}
.species-card.closed{border-left-color:var(--danger);opacity:.7}
.species-card.seasonal{border-left-color:var(--warning)}
.species-card.invasive{border-left-color:#7b2d8b}
.card-img{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg)}
.card-img-placeholder{width:52px;height:52px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-sci{font-size:11px;color:var(--text-muted);font-style:italic;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-open{background:#e8f5ee;color:var(--success)}
.badge-closed{background:#fde8e8;color:var(--danger)}
.badge-seasonal{background:#fdf0e0;color:#7a4f00}
.badge-invasive{background:#f3e8f8;color:#7b2d8b}
.card-limit{font-size:11px;color:var(--text-muted)}
.card-arrow{color:var(--ocean-light);font-size:16px;flex-shrink:0}

/* ── Loading / empty ── */
.loading-state,.no-results{padding:40px 20px;text-align:center;color:var(--text-muted)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--ocean);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.no-results-icon{font-size:48px;margin-bottom:12px}

/* ── Drawer ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;z-index:201;transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:88vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.drawer.open{transform:translateX(-50%) translateY(0)}
.drawer-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.drawer-body{padding:16px 20px 32px}
.d-img{width:100%;height:200px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:16px}
.d-name{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;color:var(--text);line-height:1.2}
.d-sci{font-size:13px;color:var(--text-muted);font-style:italic;margin-top:4px;margin-bottom:16px}
.d-section{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin:16px 0 8px}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.d-tile{background:var(--bg);border-radius:var(--radius-sm);padding:10px 12px}
.d-tile-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.d-tile-value{font-size:16px;font-weight:700;color:var(--ocean);font-family:'Unbounded',sans-serif}
.d-tile-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.d-note{background:var(--bg);border-radius:var(--radius-sm);padding:12px;font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px}
.d-note.warning{background:#fdf0e0;color:#7a4f00;border-left:3px solid var(--warning)}
.d-note.danger{background:#fde8e8;color:#7a0000;border-left:3px solid var(--danger)}
.d-save-btn{width:100%;padding:13px;background:var(--bg);color:var(--ocean);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.d-save-btn.saved{background:#fff8e1;border-color:var(--warning);color:#7a4f00}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav-h);background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;text-decoration:none;color:var(--text-muted);font-size:10px;font-family:'DM Sans',sans-serif;transition:color .2s}
.nav-item.active{color:var(--ocean)}
.nav-icon{font-size:22px;line-height:1}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-wave"></div>
  <div class="header-content">
    <div class="app-eyebrow">Own Your Waters.</div>
    <div class="app-name">Fish<span>Smarter</span></div>
    <div class="search-wrap">
      <span style="font-size:16px;color:rgba(255,255,255,.6)">🔍</span>
      <input id="searchInput" type="text" placeholder="Search species, e.g. rockfish, bass…" autocomplete="off">
    </div>
  </div>
</div>

<!-- Filter tabs -->
<div class="tabs-wrap">
  <button class="filter-tab active" data-filter="all">All Species</button>
  <button class="filter-tab" data-filter="saltwater">🌊 Saltwater</button>
  <button class="filter-tab" data-filter="freshwater">🏞 Freshwater</button>
  <button class="filter-tab" data-filter="open">✅ Open Now</button>
  <button class="filter-tab" data-filter="caution">📅 Check Dates</button>
  <button class="filter-tab" data-filter="invasive">⚠️ Invasive</button>
  <button class="filter-tab" data-filter="saved">⭐ Saved</button>
</div>

<!-- Action bar -->
<div class="action-bar">
  <button class="btn-map" onclick="window.location.href='map.html'">🗺️ View MPA Map</button>
</div>

<!-- Alert banner (shown when active closures exist) -->
<div class="alert-banner" id="alertBanner" style="display:none" onclick="showClosures()">
  <span>⚠️</span><span id="alertText">Active closure in effect</span><span style="margin-left:auto">›</span>
</div>



<!-- Species list -->
<div class="species-list" id="speciesList">
  <div class="loading-state">
    <div class="spinner"></div>
    <div>Loading California regulations…</div>
  </div>
</div>

<!-- Drawer overlay + sheet -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a class="nav-item active" data-page="species" href="index.html">
    <span class="nav-icon">🐟</span><span>Species</span>
  </a>
  <a class="nav-item" data-page="fishid" href="fishid.html">
    <span class="nav-icon">📷</span><span>Fish ID</span>
  </a>
  <a class="nav-item" data-page="forecast" href="forecast.html">
    <span class="nav-icon">🌊</span><span>Forecast</span>
  </a>
  <a class="nav-item" data-page="account" href="account.html">
    <span class="nav-icon">👤</span><span>Account</span>
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script>
// ── State ────────────────────────────────────────────────────
var allSpecies = [];
var allRegulations = [];
var currentFilter = 'all';
var currentSearch = '';

// ── Load data ────────────────────────────────────────────────
async function loadData() {
  try {
    const [specRes, regRes, closureRes] = await Promise.all([
      db.from('species').select('*').order('name'),
      db.from('regulations').select('*'),
      db.from('emergency_closures').select('*').eq('is_active', true)
    ]);
    allSpecies = specRes.data || [];
    allRegulations = regRes.data || [];

    if (closureRes.data && closureRes.data.length > 0) {
      var banner = document.getElementById('alertBanner');
      var txt = document.getElementById('alertText');
      banner.style.display = 'flex';
      txt.textContent = closureRes.data.length === 1
        ? '⚠️ ' + closureRes.data[0].title
        : '⚠️ ' + closureRes.data.length + ' active closures in effect';
      window._closures = closureRes.data;
    }
    renderList();
  } catch(e) {
    document.getElementById('speciesList').innerHTML =
      '<div class="no-results"><div class="no-results-icon">⚠️</div><p>Could not load data. Check your connection.</p></div>';
  }
}

// ── Show closures in drawer ───────────────────────────────────
function showClosures() {
  var closures = window._closures || [];
  var html = '<div class="d-section">Active Closures</div>';
  closures.forEach(function(c) {
    html += '<div class="d-note danger" style="margin-bottom:10px">'
      + '<strong>' + c.title + '</strong><br>'
      + '<span style="font-size:12px">Effective ' + (c.effective_date || '') + (c.expiration_date ? ' · Expires ' + c.expiration_date : '') + '</span><br>'
      + (c.description || '') + '</div>';
  });
  document.getElementById('drawerBody').innerHTML = html;
  openDrawer();
}

// ── Render list ───────────────────────────────────────────────
function renderList() {
  var savedIds = getSavedIds();
  var list = allSpecies.filter(function(sp) {
    // Filter
    if (currentFilter === 'saltwater' && sp.water_type !== 'saltwater') return false;
    if (currentFilter === 'freshwater' && sp.water_type !== 'freshwater') return false;
    if (currentFilter === 'saved' && !savedIds.includes(sp.id)) return false;
    if (currentFilter === 'invasive' && sp.category !== 'Invasive') return false;

    var reg = allRegulations.find(function(r) { return r.species_id === sp.id; });
    var status = deriveStatus(reg);
    if (currentFilter === 'open' && status !== 'open') return false;
    if (currentFilter === 'caution' && status !== 'seasonal') return false;

    // Search
    if (currentSearch) {
      var q = currentSearch.toLowerCase();
      var nameMatch = sp.name && sp.name.toLowerCase().includes(q);
      var sciMatch = sp.scientific_name && sp.scientific_name.toLowerCase().includes(q);
      var catMatch = sp.category && sp.category.toLowerCase().includes(q);
      if (!nameMatch && !sciMatch && !catMatch) return false;
    }
    return true;
  });

  if (!list.length) {
    document.getElementById('speciesList').innerHTML =
      '<div class="no-results"><div class="no-results-icon">🔍</div><h3>No species found</h3><p>Try a different search or filter</p></div>';
    return;
  }

  var html = '<div class="section-label">' + list.length + ' species</div>';
  list.forEach(function(sp) {
    var reg = allRegulations.find(function(r) { return r.species_id === sp.id; });
    var status = deriveStatus(reg);
    var badgeClass = sp.category === 'Invasive' ? 'badge-invasive' : getBadgeClass(status);
    var badgeText = sp.category === 'Invasive' ? '⚠️ Invasive' : getStatusLabel(status);
    var cardClass = sp.category === 'Invasive' ? 'invasive' : status;
    var limitText = '';
    if (reg) {
      if (reg.bag_limit === 0) limitText = 'No take';
      else if (reg.bag_limit) limitText = reg.bag_limit + '/day';
      if (reg.size_min_inches) limitText += (limitText ? ' · ' : '') + 'Min ' + reg.size_min_inches + '"';
    }

    html += '<div class="species-card ' + cardClass + '" onclick="openDrawer(' + sp.id + ')">'
      + (sp.image_url
        ? '<img class="card-img" src="' + sp.image_url + '" alt="' + sp.name + '" loading="lazy" onerror="this.style.display=\'none\'">'
        : '<div class="card-img-placeholder">' + getEmoji(sp.name) + '</div>')
      + '<div class="card-body">'
      +   '<div class="card-name">' + sp.name + '</div>'
      +   (sp.scientific_name ? '<div class="card-sci">' + sp.scientific_name + '</div>' : '')
      +   '<div class="card-meta">'
      +     '<span class="badge ' + badgeClass + '">' + badgeText + '</span>'
      +     (limitText ? '<span class="card-limit">' + limitText + '</span>' : '')
      +   '</div>'
      + '</div>'
      + '<span class="card-arrow">›</span>'
      + '</div>';
  });

  document.getElementById('speciesList').innerHTML = html;
}

// ── Drawer ────────────────────────────────────────────────────
function openDrawer(speciesId) {
  if (!speciesId) {
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
    return;
  }
  var sp = allSpecies.find(function(s) { return s.id === speciesId; });
  if (!sp) return;
  var reg = allRegulations.find(function(r) { return r.species_id === sp.id; });
  var status = deriveStatus(reg);
  var savedIds = getSavedIds();
  var isSaved = savedIds.includes(sp.id);

  var html = '';
  if (sp.image_url) {
    html += '<img class="d-img" src="' + sp.image_url + '" alt="' + sp.name + '" onerror="this.style.display=\'none\'">';
  }

  html += '<div class="d-name">' + sp.name + '</div>';
  if (sp.scientific_name) html += '<div class="d-sci">' + sp.scientific_name + '</div>';

  // Status + water type badges
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'
    + '<span class="badge ' + getBadgeClass(status) + '">' + getStatusLabel(status) + '</span>'
    + '<span class="badge" style="background:var(--bg);color:var(--text-muted)">' + (sp.water_type || '') + '</span>'
    + (sp.category ? '<span class="badge" style="background:var(--bg);color:var(--text-muted)">' + sp.category + '</span>' : '')
    + '</div>';

  if (sp.description) {
    html += '<div class="d-note">' + sp.description + '</div>';
  }

  if (reg) {
    html += '<div class="d-section">Regulations</div>';
    html += '<div class="d-grid">';

    if (reg.bag_limit === 0) {
      html += '<div class="d-tile" style="grid-column:1/-1;background:#fde8e8">'
        + '<div class="d-tile-label">Status</div>'
        + '<div class="d-tile-value" style="color:var(--danger);font-size:14px">NO TAKE</div>'
        + '<div class="d-tile-sub">Fully protected</div></div>';
    } else {
      if (reg.bag_limit) {
        html += '<div class="d-tile"><div class="d-tile-label">Bag Limit</div>'
          + '<div class="d-tile-value">' + reg.bag_limit + '</div>'
          + '<div class="d-tile-sub">per day</div></div>';
      }
      if (reg.size_min_inches) {
        html += '<div class="d-tile"><div class="d-tile-label">Min Size</div>'
          + '<div class="d-tile-value">' + reg.size_min_inches + '"</div>'
          + '<div class="d-tile-sub">total length</div></div>';
      }
    }
    html += '</div>';

    if (reg.season_note) {
      html += '<div class="d-tile" style="margin-bottom:8px">'
        + '<div class="d-tile-label">Season</div>'
        + '<div style="font-size:14px;font-weight:500;margin-top:2px">' + reg.season_note + '</div></div>';
    }
    if (reg.gear_restricted) {
      html += '<div class="d-tile" style="margin-bottom:8px">'
        + '<div class="d-tile-label">Gear</div>'
        + '<div style="font-size:13px;margin-top:2px">' + reg.gear_restricted + '</div></div>';
    }
    if (reg.special_notes) {
      var noteClass = reg.special_notes.toUpperCase().includes('PROHIBITED') || reg.special_notes.includes('⚠️') ? 'danger' : 'warning';
      html += '<div class="d-note ' + noteClass + '">' + reg.special_notes + '</div>';
    }
  }

  if (sp.identification_tips) {
    html += '<div class="d-section">Identification Tips</div>'
      + '<div class="d-note">' + sp.identification_tips + '</div>';
  }

  html += '<div style="font-size:11px;color:var(--text-muted);margin:12px 0 8px;line-height:1.5">'
    + 'Always verify at <a href="https://wildlife.ca.gov" style="color:var(--ocean-light)">wildlife.ca.gov</a> before keeping any catch.</div>';

  html += '<button class="d-save-btn' + (isSaved ? ' saved' : '') + '" id="saveBtn" onclick="handleSave(' + sp.id + ')">'
    + (isSaved ? '⭐ Saved' : '☆ Save Species') + '</button>';

  document.getElementById('drawerBody').innerHTML = html;
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function handleSave(id) {
  var isSaved = toggleSaved(id);
  var btn = document.getElementById('saveBtn');
  if (btn) {
    btn.textContent = isSaved ? '⭐ Saved' : '☆ Save Species';
    btn.className = 'd-save-btn' + (isSaved ? ' saved' : '');
  }
  // Re-render if on saved filter
  if (currentFilter === 'saved') renderList();
}



// ── Events ────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function(e) {
  currentSearch = e.target.value.trim();
  renderList();
});

document.querySelectorAll('.filter-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    renderList();
  });
});

// Swipe down to close drawer
var touchStartY = 0;
document.getElementById('drawer').addEventListener('touchstart', function(e) {
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById('drawer').addEventListener('touchend', function(e) {
  if (e.changedTouches[0].clientY - touchStartY > 80) closeDrawer();
}, {passive:true});

// ── Init ──────────────────────────────────────────────────────
// Clear old service workers and caches
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(r) { r.unregister(); });
  });
}
if ('caches' in window) {
  caches.keys().then(function(keys) {
    keys.forEach(function(k) { caches.delete(k); });
  });
}

loadData();
</script>
